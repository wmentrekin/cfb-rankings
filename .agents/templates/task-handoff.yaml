# Contract: developer handoff created by $work during execution

artifact: task_handoff
feature: "<feature-slug>"
mode: "bounded-feature"
execution_batch_id: ""
task_id: ""
owner_skill: work

objective: ""
why_this_matters: ""

inputs:
  requirements: "docs/<feature>/requirements.yaml"
  plan: "docs/<feature>/plan.yaml"
  implementation_report: "docs/<feature>/implementation-report.yaml"
  relevant_paths: []

scope:
  owned: []
  forbidden: []

implementation_notes: []

success_criteria: []

validation_expected: []

output_format:
  sections:
    - Changes
    - Local Validation
    - Blockers
    - Notes

escalate_if:
  - missing_context
  - conflicting_artifacts
  - product_or_architecture_guess_required
  - scope_expansion_required
